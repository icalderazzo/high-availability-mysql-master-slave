services:
  mysql-master:
    image: mysql:8.0.42
    container_name: mysql-master
    # server-id=1 is required for binary logging / replication
    command: --server-id=1 --log-bin=mysql-bin --binlog-format=row
    volumes:
      # Files are processed in alphabetical order from /docker-entrypoint-initdb.d/
      # 01 - seed the classicmodels sample database
      - ./data-samples/mysqltutorial.org/mysql-classicmodesl.sql:/docker-entrypoint-initdb.d/01-classicmodels.sql:ro
      # 02 - grant REPLICATION SLAVE privilege to replication_user (runs after seed)
      - ./mysql/master/init.sql:/docker-entrypoint-initdb.d/02-replication.sql:ro
      - mysql_master_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: your_super_secure_root_password
      MYSQL_DATABASE: classicmodels
      # This user is created by Docker and then granted REPLICATION SLAVE in 02-replication.sql
      MYSQL_USER: replication_user
      MYSQL_PASSWORD: replication_password_123
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-pyour_super_secure_root_password", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  mysql-slave:
    image: mysql:8.0.42
    container_name: mysql-slave
    depends_on:
      mysql-master:
        condition: service_healthy
    # The init.sh script starts MySQL, seeds from master, configures replication, then runs MySQL in foreground
    entrypoint: ["/bin/bash", "/slave-init/init.sh"]
    volumes:
      - ./mysql/slave:/slave-init:ro
      - mysql_slave_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: your_super_secure_root_password
      MYSQL_DATABASE: classicmodels
      MYSQL_USER: replication_user
      MYSQL_PASSWORD: replication_password_123
      MASTER_HOST: mysql-master
      MASTER_PORT: 3306
      MASTER_USER: replication_user
      MASTER_PASSWORD: replication_password_123
    ports:
      - "3307:3306"

volumes:
  mysql_master_data:
  mysql_slave_data:

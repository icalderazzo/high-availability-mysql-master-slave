services:
  mysql-master:
    image: mysql:8.0.42
    container_name: mysql-master
    # server-id=1 is required for binary logging / replication
    command: --server-id=1 --log-bin=mysql-bin --binlog-format=row
    volumes:
      # Files are processed in alphabetical order from /docker-entrypoint-initdb.d/
      # 01 - seed the classicmodels sample database
      - ./data-samples/mysqltutorial.org/mysql-classicmodesl.sql:/docker-entrypoint-initdb.d/01-classicmodels.sql:ro
      # 02 - grant REPLICATION SLAVE privilege to replication_user (runs after seed)
      - ./mysql/master/init.sql:/docker-entrypoint-initdb.d/02-replication.sql:ro
      # 03 - create business stored procedures
      - ./mysql/stored_proc/monthly-sales-report.sql:/docker-entrypoint-initdb.d/03-monthly-sales-report.sql:ro
      - mysql_master_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: your_super_secure_root_password
      MYSQL_DATABASE: classicmodels
      # This user is created by Docker and then granted REPLICATION SLAVE in 02-replication.sql
      MYSQL_USER: replication_user
      MYSQL_PASSWORD: replication_password_123
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-pyour_super_secure_root_password", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - mysql-network

  mysql-slave:
    image: mysql:8.0.42
    container_name: mysql-slave
    depends_on:
      mysql-master:
        condition: service_healthy
    # The init.sh script starts MySQL, seeds from master, configures replication, then runs MySQL in foreground
    entrypoint: ["/bin/bash", "/slave-init/init.sh"]
    volumes:
      - ./mysql/slave:/slave-init:ro
      - mysql_slave_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: your_super_secure_root_password
      MYSQL_DATABASE: classicmodels
      MYSQL_USER: replication_user
      MYSQL_PASSWORD: replication_password_123
      MASTER_HOST: mysql-master
      MASTER_PORT: 3306
      MASTER_USER: replication_user
      MASTER_PASSWORD: replication_password_123
    ports:
      - "3307:3306"
    networks:
      - mysql-network

  proxysql:
    image: proxysql/proxysql:2.5.5
    container_name: proxysql
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_started
    volumes:
      - ./proxysql/proxysql.cnf:/etc/proxysql.cnf:ro
      - proxysql_data:/var/lib/proxysql
    environment:
      MYSQL_ROOT_PASSWORD: your_super_secure_root_password
    ports:
      - "6033:6033"  # MySQL interface for application connections
      - "6032:6032"  # Admin interface for management
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h127.0.0.1", "-P6033", "-uordersapp", "-pordersapp_password", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mysql-network
      - services-network

  orders-service:
    build:
      context: ./orders-service
    image: orders-service:latest
    container_name: orders-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CONNECTION_STRING: Server=proxysql;Port=6033;Database=classicmodels;User=ordersapp;Password=ordersapp_password;
    ports:
      - "8080:80"
    networks:
      - services-network

volumes:
  mysql_master_data:
  mysql_slave_data:
  proxysql_data:

networks:
  mysql-network:
    driver: bridge
  services-network:
    driver: bridge